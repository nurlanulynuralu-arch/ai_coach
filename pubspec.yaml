name: ai_study_coach
description: A startup-ready Flutter MVP for AI-guided exam preparation.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.0.1
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.1
  firebase_core: ^4.1.1
  firebase_storage: ^13.0.1
  file_picker: ^10.1.9
  go_router: ^16.0.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.3.1
  intl: ^0.20.2
  provider: ^6.1.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  image_path: assets/branding/app_icon.png
  min_sdk_android: 21
